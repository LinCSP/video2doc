name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  linux:
    name: Linux (Ubuntu, x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libwxgtk3.2-dev libgtk-3-dev

      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: ninja -C build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: Video2Doc-linux
          path: build/bin/Video2Doc
          if-no-files-found: error

  windows:
    name: Windows (MinGW cross-compile, x64 zip)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Windows binary via Docker
        run: |
          cd docker
          ./build-win.sh "${{ github.workspace }}"

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: Video2Doc-windows
          path: docker/output/*.zip
          if-no-files-found: error
