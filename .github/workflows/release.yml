name: Release

# Triggered by a version tag: v0.1.0, v1.2.3, etc.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+*'

jobs:
  linux-ubuntu:
    name: Linux .tar.gz (Ubuntu, x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libwxgtk3.2-dev libgtk-3-dev

      - name: Build
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
          ninja -C build

      - name: Package
        run: |
          mkdir -p "Video2Doc-${{ github.ref_name }}-linux-x64"
          cp build/bin/Video2Doc "Video2Doc-${{ github.ref_name }}-linux-x64/"
          cp requirements.txt install-deps.sh "Video2Doc-${{ github.ref_name }}-linux-x64/"
          tar czf "Video2Doc-${{ github.ref_name }}-linux-x64.tar.gz" \
            "Video2Doc-${{ github.ref_name }}-linux-x64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-ubuntu-release
          path: Video2Doc-*.tar.gz
          if-no-files-found: error

  linux-arch:
    name: Linux binary (Arch, x86_64)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel cmake ninja \
            wxwidgets-gtk3 gtk3 glib2

      - name: Build
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
          ninja -C build

      - name: Package
        run: |
          mkdir -p "Video2Doc-${{ github.ref_name }}-arch-x64"
          cp build/bin/Video2Doc "Video2Doc-${{ github.ref_name }}-arch-x64/"
          cp requirements.txt install-deps.sh "Video2Doc-${{ github.ref_name }}-arch-x64/"
          tar czf "Video2Doc-${{ github.ref_name }}-arch-x64.tar.gz" \
            "Video2Doc-${{ github.ref_name }}-arch-x64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arch-release
          path: Video2Doc-*.tar.gz
          if-no-files-found: error

  linux-fedora:
    name: RPM (Fedora, x86_64)
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            cmake ninja-build gcc-c++ git \
            wxGTK-devel gtk3-devel glib2-devel \
            rpm-build

      - name: Build
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          ninja -C build

      - name: Package RPM
        run: cpack -G RPM --config build/CPackConfig.cmake -B build/packages

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-fedora-release
          path: build/packages/*.rpm
          if-no-files-found: error

  macos:
    name: macOS binary (arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja wxwidgets

      - name: Build
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
          ninja -C build

      - name: Package
        run: |
          mkdir -p "Video2Doc-${{ github.ref_name }}-macos-arm64"
          cp build/bin/Video2Doc "Video2Doc-${{ github.ref_name }}-macos-arm64/"
          cp requirements.txt "Video2Doc-${{ github.ref_name }}-macos-arm64/"
          tar czf "Video2Doc-${{ github.ref_name }}-macos-arm64.tar.gz" \
            "Video2Doc-${{ github.ref_name }}-macos-arm64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: Video2Doc-*.tar.gz
          if-no-files-found: error

  windows:
    name: Windows zip (MinGW cross-compile, x64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Windows binary via Docker
        run: |
          cd docker
          ./build-win.sh "${{ github.workspace }}"

      - name: Rename artifact with version
        run: |
          cd docker/output
          for f in Video2Doc-win64-*.zip; do
            mv "$f" "Video2Doc-${{ github.ref_name }}-win64.zip"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: docker/output/Video2Doc-*.zip
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: [linux-ubuntu, linux-arch, linux-fedora, macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"

          # Delete existing release/tag if left from a failed previous run
          gh release delete "$TAG" --yes 2>/dev/null || true

          # Collect artifacts
          FILES=()
          for f in dist/*.tar.gz dist/*.zip dist/*.rpm; do
            [ -f "$f" ] && FILES+=("$f")
          done
          echo "Uploading: ${FILES[*]}"

          # Mark as prerelease if tag contains a/b/rc
          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -qE '[0-9](a|b|rc)[0-9]'; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "Video2Doc $TAG" \
            --generate-notes \
            $PRERELEASE_FLAG \
            "${FILES[@]}"
