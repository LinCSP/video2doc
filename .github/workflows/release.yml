name: Release

# Triggered by a version tag: v0.1.0, v1.2.3, etc.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+*'

jobs:
  appimage:
    name: AppImage (x86_64, Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libwxgtk3.2-dev libgtk-3-dev \
            libfuse2 wget

      - name: Build
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
          ninja -C build

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Create AppImage
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p AppDir/usr/bin
          cp build/bin/Video2Doc AppDir/usr/bin/
          cp packaging/appimage/video2doc.desktop AppDir/

          # Convert SVG icon to PNG for linuxdeploy
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 256 -h 256 \
            packaging/appimage/video2doc.svg \
            -o packaging/appimage/video2doc.png

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file packaging/appimage/video2doc.desktop \
            --icon-file packaging/appimage/video2doc.png \
            --output appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-release
          path: Video2Doc-*.AppImage
          if-no-files-found: error

  linux-ubuntu:
    name: Linux .tar.gz (Ubuntu, x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libwxgtk3.2-dev libgtk-3-dev

      - name: Build
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
          ninja -C build

      - name: Package
        run: |
          mkdir -p "Video2Doc-${{ github.ref_name }}-linux-x64"
          cp build/bin/Video2Doc "Video2Doc-${{ github.ref_name }}-linux-x64/"
          cp requirements.txt install-deps.sh "Video2Doc-${{ github.ref_name }}-linux-x64/"
          tar czf "Video2Doc-${{ github.ref_name }}-linux-x64.tar.gz" \
            "Video2Doc-${{ github.ref_name }}-linux-x64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-ubuntu-release
          path: Video2Doc-*.tar.gz
          if-no-files-found: error

  linux-arch:
    name: Linux binary (Arch, x86_64)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel cmake ninja \
            wxwidgets-gtk3 gtk3 glib2

      - name: Build
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
          ninja -C build

      - name: Package
        run: |
          mkdir -p "Video2Doc-${{ github.ref_name }}-arch-x64"
          cp build/bin/Video2Doc "Video2Doc-${{ github.ref_name }}-arch-x64/"
          cp requirements.txt install-deps.sh "Video2Doc-${{ github.ref_name }}-arch-x64/"
          tar czf "Video2Doc-${{ github.ref_name }}-arch-x64.tar.gz" \
            "Video2Doc-${{ github.ref_name }}-arch-x64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arch-release
          path: Video2Doc-*.tar.gz
          if-no-files-found: error

  linux-fedora:
    name: RPM (Fedora, x86_64)
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            cmake ninja-build gcc-c++ git \
            wxGTK-devel gtk3-devel glib2-devel \
            rpm-build

      - name: Build
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          ninja -C build

      - name: Package RPM
        run: cpack -G RPM --config build/CPackConfig.cmake -B build/packages

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-fedora-release
          path: build/packages/*.rpm
          if-no-files-found: error

  macos:
    name: macOS binary (arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja wxwidgets

      - name: Build
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
          ninja -C build

      - name: Package
        run: |
          mkdir -p "Video2Doc-${{ github.ref_name }}-macos-arm64"
          cp build/bin/Video2Doc "Video2Doc-${{ github.ref_name }}-macos-arm64/"
          cp requirements.txt "Video2Doc-${{ github.ref_name }}-macos-arm64/"
          tar czf "Video2Doc-${{ github.ref_name }}-macos-arm64.tar.gz" \
            "Video2Doc-${{ github.ref_name }}-macos-arm64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: Video2Doc-*.tar.gz
          if-no-files-found: error

  windows-build:
    name: Windows binary (MinGW cross-compile, x64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Windows binary via Docker
        run: |
          cd docker
          ./build-win.sh "${{ github.workspace }}"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: docker/output/Video2Doc-win64-*.zip
          if-no-files-found: error

  windows-installer:
    name: Windows installer (Inno Setup, x64)
    runs-on: windows-latest
    needs: windows-build

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: windows-zip

      - name: Extract to deploy\
        run: |
          New-Item -ItemType Directory -Path deploy -Force | Out-Null
          $zip = Get-ChildItem "windows-zip\*.zip" | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath deploy -Force
          Write-Host "deploy\ contents:"
          Get-ChildItem deploy\ | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Create installer with Inno Setup
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          ISCC.exe /O. /DMyAppVersion=$version packaging\inno\video2doc.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Video2Doc-*-windows-x64.exe
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: [appimage, linux-ubuntu, linux-arch, linux-fedora, macos, windows-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"

          # Delete existing release/tag if left from a failed previous run
          gh release delete "$TAG" --yes 2>/dev/null || true

          # Collect artifacts
          FILES=()
          for f in dist/*.AppImage dist/*.tar.gz dist/*.zip dist/*.rpm dist/*.exe; do
            [ -f "$f" ] && FILES+=("$f")
          done
          echo "Uploading: ${FILES[*]}"

          # Mark as prerelease if tag contains a/b/rc
          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -qE '[0-9](a|b|rc)[0-9]'; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "Video2Doc $TAG" \
            --generate-notes \
            $PRERELEASE_FLAG \
            "${FILES[@]}"
